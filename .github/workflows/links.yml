name: Link check

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --insecure './**/*.html'
          fail: false
